<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聲音數位化教學：動態示波器版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f7f9;
            line-height: 1.6;
        }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 0.9em; }
        .chart-container { position: relative; height: 320px; width: 100%; background-color: #1e1e1e; border: 1px solid #e1e4e8; border-radius: 4px; padding: 10px; box-sizing: border-box; }
        .canvas-label { font-weight: bold; margin-bottom: 10px; color: #34495e; display: block; background: #ebf2f7; padding: 5px; border-radius: 4px; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 20px; }
        .control-group { border-bottom: 1px solid #eee; padding-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-weight: bold; margin-bottom: 5px; color: #d35400; }
        .checkbox-label input { margin-right: 10px; transform: scale(1.2); }
        .value-display { color: #e67e22; font-weight: bold; font-size: 1.2em; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button {
            border: none; padding: 12px 20px; font-size: 15px; border-radius: 4px;
            cursor: pointer; font-weight: bold; transition: all 0.3s; flex: 1; min-width: 140px;
        }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }
        #uploadBtn { background-color: #27ae60; color: white; width: 100%; margin-bottom: 20px; }
        #uploadBtn:hover { background-color: #219653; }
        #playOriginalBtn { background-color: #2ecc71; color: white; }
        #playOriginalBtn:hover:not(:disabled) { background-color: #27ae60; }
        #playDigitalBtn { background-color: #e74c3c; color: white; }
        #playDigitalBtn:hover:not(:disabled) { background-color: #c0392b; }
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:hover:not(:disabled) { background-color: #2c3e50; }

        .warning-text {
            color: #c0392b; font-size: 0.85em; margin-top: 10px;
            background-color: #fdf2f2; padding: 12px; border-radius: 6px; border-left: 4px solid #e74c3c;
        }
        .note-highlight { color: #d35400; font-weight: bold; }
        #timeDisplay { color: #00ff00; font-family: monospace; font-size: 1.1em; }
    </style>
</head>
<body>

    <h2>聲音數位化：動態示波器版</h2>
    <div class="subtitle">波形將隨聲音播放即時滾動。邊聽邊拉動滑桿，體驗即時音質變化。</div>

    <div class="container">
        <div class="box">
            <input type="file" id="audioLoader" accept="audio/*" style="display:none;">
            <button id="uploadBtn" onclick="document.getElementById('audioLoader').click()">🎵 點此上傳測試音檔 (MP3/WAV)</button>
            
            <span class="canvas-label">
                動態微觀示波器 (目前時間: <span id="timeDisplay">0.000</span> 秒)
            </span>
            <div class="chart-container">
                <canvas id="waveChart"></canvas>
            </div>
            
            <label class="checkbox-label" style="margin-top: 10px;">
                <input type="checkbox" id="lockWaveform"> ⏸️ 鎖定畫面 (方便觀察數位化階梯細節)
            </label>

            <div class="btn-group">
                <button id="playOriginalBtn">▶ 聽原始聲音</button>
                <button id="playDigitalBtn">▶ 聽數位化結果</button>
                <button id="stopBtn" disabled>■ 停止</button>
            </div>
            <div style="text-align: center; margin-top: 10px; font-size: 0.85em; color: #7f8c8d;">
                ※ 播放中直接拉動右側滑桿，可聽見音質變化。
            </div>
        </div>

        <div class="box controls">
            <div class="control-group">
                <label>1. 採樣頻率 (Sampling Rate): <span id="sampleRateVal" class="value-display"></span></label>
                <input type="range" id="sampleRateSlider" min="1000" max="44100" value="8000" step="100">
                <small style="color: #7f8c8d;">決定 X 軸採樣點的密度。低頻率會造成高音消失與混疊失真。</small>
            </div>
            
            <div class="control-group">
                <label>2. 量化位元深度 (Bit Depth): <span id="colorDepthVal" class="value-display"></span></label>
                <input type="range" id="bitDepthSlider" min="1" max="16" value="4">
                <div id="bitExplanation" style="font-size: 0.9em; margin-top: 5px; color: #2c3e50;"></div>
                <small style="color: #7f8c8d;">決定 Y 軸振幅的階層。位元越低，波形階梯越大，雜音越明顯。</small>
            </div>

            <div class="warning-text">
                <strong>💡 教學註記：</strong><br>
                <span id="logicNote">正在計算邏輯...</span>
            </div>
        </div>
    </div>

    <script>
        const MAX_PLAY_TIME = 30.0; 
        const VISUAL_WINDOW_SEC = 0.01; 

        let audioCtx;
        let originalBuffer = null;
        let activeSource = null;
        let chartInstance = null;
        let animationId = null;

        // 音訊狀態與計時器
        let isPlaying = false;
        let currentPlayMode = 'none';
        let playbackStartTime = 0;    
        let audioUpdateTimer = null; // 用於防抖機制

        const sampleRateSlider = document.getElementById('sampleRateSlider');
        const bitDepthSlider = document.getElementById('bitDepthSlider');
        const audioLoader = document.getElementById('audioLoader');
        const playOriginalBtn = document.getElementById('playOriginalBtn');
        const playDigitalBtn = document.getElementById('playDigitalBtn');
        const stopBtn = document.getElementById('stopBtn');
        const lockWaveform = document.getElementById('lockWaveform');
        const timeDisplay = document.getElementById('timeDisplay');
        const bitExp = document.getElementById('bitExplanation');
        const logicNote = document.getElementById('logicNote');

        function initChart() {
            const ctx = document.getElementById('waveChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: '原始平滑波形 (Analog)', data: [], borderColor: 'rgba(255, 255, 255, 0.5)', borderWidth: 2, pointRadius: 0, tension: 0.4 },
                        { label: '數位階梯波形 (Digital)', data: [], borderColor: '#00ff00', backgroundColor: '#00ff00', borderWidth: 2, stepped: true, pointRadius: 2, pointBackgroundColor: '#00ff00' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: {
                        x: { display: true, grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#888', maxTicksLimit: 5 } },
                        y: { min: -1.1, max: 1.1, grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#888' } }
                    },
                    plugins: { tooltip: { enabled: false } }, interaction: { mode: 'none' } 
                }
            });
        }

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function generateDefaultAudio() {
            initAudio();
            originalBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2.0, audioCtx.sampleRate);
            const data = originalBuffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                let t = i / audioCtx.sampleRate;
                data[i] = (Math.sin(2 * Math.PI * 440 * t) + 0.5 * Math.sin(2 * Math.PI * 880 * t)) / 1.5;
            }
            updateVisuals(0);
        }

        audioLoader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            initAudio();
            stopAudio();
            const reader = new FileReader();
            reader.onload = function(event) {
                audioCtx.decodeAudioData(event.target.result, function(buffer) {
                    originalBuffer = buffer; updateVisuals(0);
                }, () => alert("音檔解析失敗。"));
            };
            reader.readAsArrayBuffer(file);
        });

        // 獨立出建立數位化 Buffer 的運算邏輯
        function createDigitalBuffer() {
            const targetSR = parseInt(sampleRateSlider.value);
            const bits = parseInt(bitDepthSlider.value);
            const levels = Math.pow(2, bits);
            const origSR = originalBuffer.sampleRate;
            
            const processedBuffer = audioCtx.createBuffer(
                originalBuffer.numberOfChannels, 
                originalBuffer.length, 
                origSR
            );

            const holdSamples = origSR / targetSR;

            for (let channel = 0; channel < originalBuffer.numberOfChannels; channel++) {
                const origData = originalBuffer.getChannelData(channel);
                const newData = processedBuffer.getChannelData(channel);
                let currentSampleValue = 0;

                for (let i = 0; i < origData.length; i++) {
                    if (i % Math.floor(holdSamples) === 0 || i === 0) {
                        let trueY = origData[i];
                        let normalized = (trueY + 1) / 2;
                        let quantized = Math.round(normalized * (levels - 1)) / (levels - 1);
                        currentSampleValue = quantized * 2 - 1;
                    }
                    newData[i] = currentSampleValue;
                }
            }
            return processedBuffer;
        }

        function updateVisuals(startTimeSec = 0) {
            if (!originalBuffer) return;

            const targetSR = parseInt(sampleRateSlider.value);
            const bits = parseInt(bitDepthSlider.value);
            const levels = Math.pow(2, bits);

            document.getElementById('sampleRateVal').innerText = `${targetSR} Hz`;
            document.getElementById('colorDepthVal').innerText = `${bits} Bit`;
            bitExp.innerText = `振幅被劃分為 2^${bits} = ${levels} 個階層。`;
            timeDisplay.innerText = startTimeSec.toFixed(3);
            
            let quality = (targetSR >= 44100 && bits >= 16) ? "CD 等級高音質" : (bits <= 4) ? "嚴重量化雜訊 (沙沙聲)" : "壓縮音質";
            logicNote.innerHTML = `當前設定總結：<span class="note-highlight">${quality}</span>。<br>每秒抓取 ${targetSR} 次資料，每次使用 ${levels} 個階層。`;

            const origData = originalBuffer.getChannelData(0);
            const origSR = originalBuffer.sampleRate;
            const visualSamples = Math.floor(origSR * VISUAL_WINDOW_SEC); 
            let startIndex = Math.floor(startTimeSec * origSR);
            
            if (startIndex + visualSamples >= origData.length) {
                startIndex = Math.max(0, origData.length - visualSamples - 1);
            }

            const plotOrigData = [], plotDigiData = [], labels = [];
            const holdSamples = origSR / targetSR;

            for (let i = 0; i < visualSamples; i++) {
                let absoluteIndex = startIndex + i;
                labels.push((absoluteIndex / origSR).toFixed(4)); 
                plotOrigData.push(origData[absoluteIndex]);

                let sampleIndex = Math.floor(absoluteIndex / holdSamples) * holdSamples;
                let sampledY = origData[Math.floor(sampleIndex)] || 0;
                let quantized = Math.round(((sampledY + 1) / 2) * (levels - 1)) / (levels - 1);
                plotDigiData.push(quantized * 2 - 1);
            }

            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = plotOrigData;
            chartInstance.data.datasets[1].data = plotDigiData;
            chartInstance.update();
        }

        function animateWaveform() {
            if (!isPlaying) return;
            let currentOffset = (audioCtx.currentTime - playbackStartTime);
            const maxPlayable = Math.min(originalBuffer.duration, MAX_PLAY_TIME);
            if (currentOffset >= maxPlayable) {
                currentOffset = currentOffset % maxPlayable;
                playbackStartTime = audioCtx.currentTime - currentOffset;
            }
            if (!lockWaveform.checked) updateVisuals(currentOffset);
            animationId = requestAnimationFrame(animateWaveform);
        }

        function stopAudio(resetOffset = true) {
            if (activeSource) {
                activeSource.onended = null; 
                activeSource.stop();
                activeSource.disconnect();
                activeSource = null;
            }
            isPlaying = false;
            currentPlayMode = 'none';
            if (animationId) cancelAnimationFrame(animationId);
            if (resetOffset) updateVisuals(0);
            
            playOriginalBtn.disabled = false;
            playDigitalBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // 核心播放控制，支援接續播放 (Offset)
        function playBuffer(bufferToPlay, offset = 0, mode) {
            initAudio();
            if (activeSource) {
                activeSource.onended = null;
                activeSource.stop();
            }

            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = bufferToPlay;
            const playDuration = Math.min(bufferToPlay.duration, MAX_PLAY_TIME);

            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.value = -10; compressor.ratio.value = 12;
            const gainNode = audioCtx.createGain(); gainNode.gain.value = 0.5;

            activeSource.connect(compressor); compressor.connect(gainNode); gainNode.connect(audioCtx.destination);
            activeSource.onended = () => stopAudio(true);
            
            // 記錄這段聲音開始播的絕對時間，以便後續追蹤
            activeSource.start(0, offset, playDuration - offset);
            playbackStartTime = audioCtx.currentTime - offset;
            isPlaying = true;
            currentPlayMode = mode;

            playOriginalBtn.disabled = (mode === 'original');
            playDigitalBtn.disabled = (mode === 'digital');
            stopBtn.disabled = false;

            if (animationId) cancelAnimationFrame(animationId);
            animateWaveform();
        }

        playOriginalBtn.addEventListener('click', () => { 
            if (originalBuffer) playBuffer(originalBuffer, 0, 'original'); 
        });

        playDigitalBtn.addEventListener('click', () => { 
            if (!originalBuffer) return;
            const newBuffer = createDigitalBuffer();
            playBuffer(newBuffer, 0, 'digital');
        });

        stopBtn.addEventListener('click', () => stopAudio(true));

        // ----------------------------------------------------
        // 關鍵修復：監聽滑桿即時互動 (加入防抖與無縫接續)
        // ----------------------------------------------------
        function handleSliderInteraction() {
            // 如果暫停中，就只更新靜態畫面
            if (!isPlaying && !lockWaveform.checked) {
                updateVisuals(0); 
            }
            
            // 如果正在聽數位化聲音，需要重新運算並接續播放
            if (isPlaying && currentPlayMode === 'digital') {
                // 清除前一次的定時器，避免拉動過程中重複執行
                clearTimeout(audioUpdateTimer);
                
                // 延遲 150 毫秒。代表學生「停下滑鼠」的瞬間，才進行複雜運算
                audioUpdateTimer = setTimeout(() => {
                    // 計算目前音樂到底播到第幾秒了？
                    let currentOffset = (audioCtx.currentTime - playbackStartTime);
                    const maxPlayable = Math.min(originalBuffer.duration, MAX_PLAY_TIME);
                    if (currentOffset >= maxPlayable) currentOffset = currentOffset % maxPlayable;
                    
                    // 根據新數值，重新產生整個數位化音軌
                    const newBuffer = createDigitalBuffer();
                    
                    // 從剛剛斷掉的時間點，無縫接軌繼續播新產生的音軌！
                    playBuffer(newBuffer, currentOffset, 'digital');
                }, 150); 
            }
        }

        sampleRateSlider.addEventListener('input', handleSliderInteraction);
        bitDepthSlider.addEventListener('input', handleSliderInteraction);
        
        lockWaveform.addEventListener('change', () => {
             if(!isPlaying && !lockWaveform.checked) updateVisuals(0);
        });

        initChart();
        setTimeout(generateDefaultAudio, 100);

    </script>
</body>
</html>
